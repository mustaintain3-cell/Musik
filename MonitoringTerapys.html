<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Soul Family Reflexology Management</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light: #f8f9fa;
            --dark: #343a40;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ecf0f1;
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        h1 { color: var(--primary); margin: 0; }
        h2 { border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-top: 25px; }

        .flex-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .column {
            flex: 1;
            min-width: 300px;
        }

        .therapist-list {
            list-style: none;
            padding: 0;
        }

        .therapist-card {
            background: var(--light);
            border: 1px solid #ddd;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .therapist-info {
            display: flex;
            flex-direction: column;
        }

        .status-badge {
            font-size: 0.8em;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .status-masuk { background: #d4edda; color: #155724; }
        .status-libur { background: #f8d7da; color: #721c24; }
        .status-sibuk { background: #fff3cd; color: #856404; }

        .btn {
            cursor: pointer;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-sm { padding: 4px 8px; font-size: 0.8em; }
        .btn-green { background: var(--secondary); color: white; }
        .btn-red { background: var(--danger); color: white; }
        .btn-blue { background: #3498db; color: white; }
        .btn-move { background: #95a5a6; color: white; margin: 0 2px; }

        .form-group {
            margin-bottom: 15px;
            background: #fdfdfd;
            padding: 15px;
            border: 1px dashed #ccc;
            border-radius: 8px;
        }

        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .active-sessions {
            background: #fff9db;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .history-table th, .history-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        .history-table th { background: var(--primary); color: white; }

        .ranking-list {
            padding: 0;
            list-style: none;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .ranking-item:nth-child(1) { background: #ffd70033; font-weight: bold; }
        .ranking-item:nth-child(2) { background: #c0c0c033; }
        .ranking-item:nth-child(3) { background: #cd7f3233; }

        .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #ddd;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        @media screen and (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>My Soul Family</h1>
        <p>Reflexology Management System</p>
    </header>

    <div class="tab-buttons">
        <button class="tab-btn active" onclick="showSection('rolingan')">Rolingan</button>
        <button class="tab-btn" onclick="showSection('transaksi')">Pasien Baru</button>
        <button class="tab-btn" onclick="showSection('aktif')">Sedang Kerja</button>
        <button class="tab-btn" onclick="showSection('laporan')">Laporan</button>
    </div>

    <!-- SECTION: ROLINGAN -->
    <div id="rolingan" class="content-section active">
        <div class="flex-grid">
            <!-- Pria -->
            <div class="column">
                <h2>Terapis Pria</h2>
                <div id="male-list" class="therapist-list"></div>
            </div>
            <!-- Wanita -->
            <div class="column">
                <h2>Terapis Wanita</h2>
                <div id="female-list" class="therapist-list"></div>
            </div>
        </div>
    </div>

    <!-- SECTION: TRANSAKSI -->
    <div id="transaksi" class="content-section">
        <h2>Input Pasien Datang</h2>
        <div class="form-group">
            <label>Pilih Layanan</label>
            <select id="service-select">
                <option value="140000|Refleksi Flbody 90 mnt">Refleksi Flbody 90 mnt - Rp 140.000</option>
                <option value="170000|Refleksi Fulbody 120 mnt">Refleksi Fulbody 120 mnt - Rp 170.000</option>
                <option value="105000|Fullbody 60 mnt">Fullbody 60 mnt - Rp 105.000</option>
                <option value="130000|Fullbody 90 mnt">Fullbody 90 mnt - Rp 130.000</option>
                <option value="165000|Fullbody 120 mnt">Fullbody 120 mnt - Rp 165.000</option>
                <option value="125000|Spord message 60 mnt">Spord message 60 mnt - Rp 125.000</option>
                <option value="150000|Spord message 90 mnt">Spord message 90 mnt - Rp 150.000</option>
                <option value="185000|Spord message 120 mnt">Spord message 120 mnt - Rp 185.000</option>
                <option value="100000|Bekam basah">Bekam basah - Rp 100.000</option>
                <option value="50000|Kop kering">Kop kering - Rp 50.000</option>
                <option value="50000|Totok wajah Viva 30 mnt">Totok wajah Viva 30 mnt - Rp 50.000</option>
                <option value="35000|Totok wajah zaethun 15 mnt">Totok wajah zaethun 15 mnt - Rp 35.000</option>
                <option value="35000|Kerokan">Kerokan - Rp 35.000</option>
                <option value="80000|Luluran fulbody">Luluran fulbody - Rp 80.000</option>
            </select>
            
            <label style="margin-top:15px">Pilih Terapis (Request atau Sesuai Antrian)</label>
            <select id="therapist-select"></select>

            <label style="margin-top:15px">Uang Bonus (Opsional)</label>
            <input type="number" id="bonus-input" placeholder="Masukkan bonus jika ada" value="0">

            <button class="btn btn-green" style="margin-top:20px; width: 100%;" onclick="startWork()">Mulai Kerja</button>
        </div>
    </div>

    <!-- SECTION: AKTIF -->
    <div id="aktif" class="content-section">
        <h2>Terapis Sedang Bekerja</h2>
        <div id="active-list" class="active-sessions">
            <p>Tidak ada terapis yang sedang bekerja.</p>
        </div>
    </div>

    <!-- SECTION: LAPORAN -->
    <div id="laporan" class="content-section">
        <h2>Ranking Pendapatan</h2>
        <div id="ranking" class="ranking-list"></div>

        <h2>Riwayat Kerja</h2>
        <div style="overflow-x: auto;">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Terapis</th>
                        <th>Layanan</th>
                        <th>Harga</th>
                        <th>Komisi (40%)</th>
                        <th>Bonus</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
        
        <button class="btn btn-red" style="margin-top:20px" onclick="clearData()">Hapus Semua Data</button>
    </div>
</div>

<script>
    // INITIAL DATA
    const INITIAL_THERAPISTS = [
        { id: 1, name: 'Pak Alam', gender: 'male', status: 'masuk', order: 0 },
        { id: 2, name: 'Pak Misdi', gender: 'male', status: 'masuk', order: 1 },
        { id: 3, name: 'Pak Nanang', gender: 'male', status: 'masuk', order: 2 },
        { id: 4, name: 'Pak Hendy', gender: 'male', status: 'masuk', order: 3 },
        { id: 5, name: 'Pak Anto', gender: 'male', status: 'masuk', order: 4 },
        { id: 6, name: 'Bu Fukoh', gender: 'female', status: 'masuk', order: 0 },
        { id: 7, name: 'Bu Denty', gender: 'female', status: 'masuk', order: 1 },
        { id: 8, name: 'Bu Linda', gender: 'female', status: 'masuk', order: 2 },
        { id: 9, name: 'Bu Siti', gender: 'female', status: 'masuk', order: 3 }
    ];

    let state = {
        therapists: [],
        history: [],
        activeSessions: []
    };

    // LOCAL STORAGE HANDLING
    function loadData() {
        const saved = localStorage.getItem('soul_family_data');
        if (saved) {
            state = JSON.parse(saved);
        } else {
            state.therapists = [...INITIAL_THERAPISTS];
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem('soul_family_data', JSON.stringify(state));
    }

    function clearData() {
        if(confirm("Hapus semua riwayat dan reset data?")) {
            localStorage.removeItem('soul_family_data');
            location.reload();
        }
    }

    // UI RENDERING
    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        renderAll();
    }

    function renderAll() {
        renderTherapistLists();
        renderSelectionOptions();
        renderActiveSessions();
        renderHistory();
        renderRanking();
    }

    function renderTherapistLists() {
        const maleList = document.getElementById('male-list');
        const femaleList = document.getElementById('female-list');
        
        maleList.innerHTML = '';
        femaleList.innerHTML = '';

        // Sort by order
        const sorted = [...state.therapists].sort((a, b) => a.order - b.order);

        sorted.filter(t => t.gender === 'male').forEach(t => {
            maleList.appendChild(createTherapistCard(t));
        });

        sorted.filter(t => t.gender === 'female').forEach(t => {
            femaleList.appendChild(createTherapistCard(t));
        });
    }

    function createTherapistCard(t) {
        const div = document.createElement('div');
        div.className = 'therapist-card';
        div.innerHTML = `
            <div class="therapist-info">
                <strong>${t.name}</strong>
                <span class="status-badge status-${t.status}">${t.status.toUpperCase()}</span>
            </div>
            <div>
                <button class="btn btn-sm btn-move" onclick="moveOrder(${t.id}, -1.5)">↑</button>
                <button class="btn btn-sm btn-move" onclick="moveOrder(${t.id}, 1.5)">↓</button>
                <button class="btn btn-sm ${t.status === 'libur' ? 'btn-green' : 'btn-red'}" onclick="toggleStatus(${t.id})">
                    ${t.status === 'libur' ? 'Masuk' : 'Libur'}
                </button>
            </div>
        `;
        return div;
    }

    function toggleStatus(id) {
        const t = state.therapists.find(x => x.id === id);
        if (t.status === 'sibuk') return alert("Terapis masih bekerja!");
        t.status = t.status === 'masuk' ? 'libur' : 'masuk';
        saveData();
        renderAll();
    }

    function moveOrder(id, direction) {
        const therapist = state.therapists.find(t => t.id === id);
        const genderPeer = state.therapists.filter(t => t.gender === therapist.gender).sort((a,b) => a.order - b.order);
        
        const currentIndex = genderPeer.findIndex(t => t.id === id);
        const targetIndex = currentIndex + (direction > 0 ? 1 : -1);

        if (targetIndex >= 0 && targetIndex < genderPeer.length) {
            // Swap order values
            const temp = genderPeer[currentIndex].order;
            genderPeer[currentIndex].order = genderPeer[targetIndex].order;
            genderPeer[targetIndex].order = temp;
            
            saveData();
            renderAll();
        }
    }

    function renderSelectionOptions() {
        const select = document.getElementById('therapist-select');
        select.innerHTML = '<option value="">-- Pilih Terapis Tersedia (Urutan Teratas) --</option>';
        
        // Only show those who are 'masuk'
        const available = state.therapists
            .filter(t => t.status === 'masuk')
            .sort((a,b) => a.order - b.order);

        available.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.id;
            opt.textContent = `${t.name} (${t.gender === 'male' ? 'P' : 'W'})`;
            select.appendChild(opt);
        });
    }

    function startWork() {
        const serviceData = document.getElementById('service-select').value.split('|');
        const price = parseInt(serviceData[0]);
        const serviceName = serviceData[1];
        const therapistId = document.getElementById('therapist-select').value;
        const bonus = parseInt(document.getElementById('bonus-input').value) || 0;

        if (!therapistId) return alert("Pilih terapis terlebih dahulu!");

        const therapist = state.therapists.find(t => t.id == therapistId);
        therapist.status = 'sibuk';
        
        const session = {
            id: Date.now(),
            therapistId: therapist.id,
            therapistName: therapist.name,
            service: serviceName,
            price: price,
            bonus: bonus,
            startTime: new Date().toLocaleTimeString()
        };

        state.activeSessions.push(session);
        saveData();
        showSection('aktif');
        
        // Reset form
        document.getElementById('bonus-input').value = 0;
    }

    function renderActiveSessions() {
        const container = document.getElementById('active-list');
        if (state.activeSessions.length === 0) {
            container.innerHTML = '<p>Tidak ada terapis yang sedang bekerja.</p>';
            return;
        }

        container.innerHTML = '';
        state.activeSessions.forEach(s => {
            const div = document.createElement('div');
            div.style = "background:white; border:1px solid #ddd; padding:10px; margin-bottom:10px; border-radius:5px; position:relative;";
            div.innerHTML = `
                <strong>${s.therapistName}</strong><br>
                Layanan: ${s.service}<br>
                Mulai: ${s.startTime}<br>
                <button class="btn btn-green btn-sm" style="margin-top:10px" onclick="completeWork(${s.id})">Selesai Kerja</button>
            `;
            container.appendChild(div);
        });
    }

    function completeWork(sessionId) {
        const sessionIndex = state.activeSessions.findIndex(s => s.id === sessionId);
        const session = state.activeSessions[sessionIndex];
        
        // Move therapist to end of rolling queue
        const therapist = state.therapists.find(t => t.id === session.therapistId);
        therapist.status = 'masuk';
        
        // Push same gender peers down, move this one to max order
        const genderPeers = state.therapists.filter(t => t.gender === therapist.gender);
        const maxOrder = Math.max(...genderPeers.map(t => t.order));
        therapist.order = maxOrder + 1;

        // Add to history
        state.history.push({
            ...session,
            commission: session.price * 0.4,
            date: new Date().toLocaleDateString()
        });

        // Remove from active
        state.activeSessions.splice(sessionIndex, 1);
        
        saveData();
        renderAll();
        alert("Kerja selesai. Data disimpan ke laporan.");
    }

    function renderHistory() {
        const body = document.getElementById('history-body');
        body.innerHTML = '';
        
        // Show reverse chronological
        [...state.history].reverse().forEach((h, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${h.therapistName}</td>
                <td>${h.service}</td>
                <td>Rp ${h.price.toLocaleString()}</td>
                <td>Rp ${h.commission.toLocaleString()}</td>
                <td>Rp ${h.bonus.toLocaleString()}</td>
                <td>
                    <button class="btn btn-blue btn-sm" onclick="shareWA(${state.history.length - 1 - index})">WA</button>
                </td>
            `;
            body.appendChild(tr);
        });
    }

    function renderRanking() {
        const rankingDiv = document.getElementById('ranking');
        rankingDiv.innerHTML = '';

        const stats = state.therapists.map(t => {
            const tHistory = state.history.filter(h => h.therapistId === t.id);
            const totalEarned = tHistory.reduce((sum, h) => sum + h.commission + h.bonus, 0);
            return { name: t.name, total: totalEarned };
        }).sort((a,b) => b.total - a.total);

        stats.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'ranking-item';
            div.innerHTML = `
                <span>${i+1}. ${s.name}</span>
                <span>Rp ${s.total.toLocaleString()}</span>
            `;
            rankingDiv.appendChild(div);
        });
    }

    function shareWA(index) {
        const h = state.history[index];
        const text = `LAPORAN KERJA MY SOUL FAMILY\n====================\nNama: ${h.therapistName}\nLayanan: ${h.service}\nHarga: Rp ${h.price.toLocaleString()}\nKomisi (40%): Rp ${h.commission.toLocaleString()}\nBonus: Rp ${h.bonus.toLocaleString()}\nTotal Diterima: Rp ${(h.commission + h.bonus).toLocaleString()}\nTanggal: ${h.date}\n====================`;
        const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
        window.open(url, '_blank');
    }

    // Init
    loadData();
    renderAll();
</script>

</body>
</html>
