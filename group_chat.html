<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALAM TERAPY | Private Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#075E54',
                        accent: '#10b981',
                        chatBg: '#f0f2f5',
                        bubbleMe: '#dcf8c6',
                        bubbleOther: '#ffffff',
                        darkSlate: '#0f172a'
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at top right, #f8fafc, #e2e8f0);
            min-height: 100vh;
            overflow: hidden;
        }

        .glass-header {
            background: rgba(7, 94, 84, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-container {
            height: calc(100vh - 140px);
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .chat-container::-webkit-scrollbar {
            width: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }

        .message-bubble {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-focus-effect:focus {
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        #loginBox {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="font-sans">

    <!-- Header -->
    <header class="glass-header sticky top-0 z-50 px-6 py-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-accent flex items-center justify-center text-white shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
            </div>
            <div>
                <h1 class="font-display font-extrabold text-white text-xl tracking-tight leading-none">ALAM TERAPY</h1>
                <p class="text-[10px] text-accent font-bold uppercase tracking-widest mt-1 flex items-center gap-1">
                    <span class="w-2 h-2 bg-accent rounded-full animate-pulse"></span> Online Community
                </p>
            </div>
        </div>
        <button id="logoutBtn" onclick="logout()" class="hidden text-white/70 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        </button>
    </header>

    <!-- Login View -->
    <main id="loginBox" class="max-w-md mx-auto mt-20 p-8 rounded-[2rem] shadow-glass border border-white flex flex-col items-center">
        <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </div>
        <h2 class="font-display text-2xl font-bold text-darkSlate mb-2">Selamat Datang</h2>
        <p class="text-slate-500 text-sm mb-8 text-center">Masukkan nama Anda untuk mulai berbincang dengan komunitas.</p>
        
        <div class="w-full space-y-4">
            <input type="text" id="nama" placeholder="Ketik nama Anda..." 
                   class="w-full px-5 py-4 rounded-2xl bg-slate-100 border-none focus:ring-2 focus:ring-accent outline-none transition-all font-medium text-slate-700">
            <button onclick="login()" 
                    class="w-full bg-primary hover:bg-darkSlate text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                Masuk ke Obrolan
            </button>
        </div>
    </main>

    <!-- Chat View -->
    <main id="chatBox" class="hidden flex flex-col h-[calc(100vh-80px)]">
        <div id="chat" class="chat-container flex-1 overflow-y-auto px-4 py-6 space-y-4">
            <!-- Messages will be injected here -->
        </div>

        <!-- Input Area -->
        <footer class="p-4 bg-white/80 backdrop-blur-md border-t border-slate-100">
            <div class="max-w-4xl mx-auto flex items-center gap-3">
                <div class="flex-1 relative">
                    <input type="text" id="pesan" placeholder="Tulis pesan..." 
                           class="w-full pl-6 pr-12 py-4 rounded-full bg-slate-100 border-none focus:ring-2 focus:ring-accent outline-none transition-all font-medium input-focus-effect"
                           onkeypress="if(event.key === 'Enter') kirim()">
                </div>
                <button onclick="kirim()" 
                        class="w-14 h-14 bg-primary text-white rounded-full flex items-center justify-center shadow-lg hover:shadow-primary/30 hover:scale-105 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
        </footer>
    </main>

    <!-- Firebase JS -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            databaseURL: "https://alamterapi1-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const notificationSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

        // User Session
        let user = localStorage.getItem("nama");

        // Initialize UI
        if (user) {
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("chatBox").classList.remove("hidden");
            document.getElementById("logoutBtn").classList.remove("hidden");
            loadChat();
        }

        function login() {
            const namaInput = document.getElementById("nama");
            const nama = namaInput.value.trim();
            if (nama === "") {
                alert("Silakan masukkan nama Anda!");
                return;
            }
            localStorage.setItem("nama", nama);
            window.location.reload();
        }

        function logout() {
            if(confirm("Apakah Anda ingin keluar?")) {
                localStorage.removeItem("nama");
                window.location.reload();
            }
        }

        function kirim() {
            const inputPesan = document.getElementById("pesan");
            const pesan = inputPesan.value.trim();
            if (pesan === "") return;

            const chatRef = db.ref("chat");
            const timestamp = new Date().getTime();

            // Push message
            chatRef.push({
                nama: user,
                pesan: pesan,
                waktu: timestamp
            });

            // Cleanup logic (Max 50 messages)
            chatRef.once("value", function(snapshot) {
                const total = snapshot.numChildren();
                if (total > 50) {
                    let count = 0;
                    let toDelete = total - 50;
                    snapshot.forEach(function(child) {
                        if (count < toDelete) {
                            db.ref("chat/" + child.key).remove();
                            count++;
                        }
                    });
                }
            });

            inputPesan.value = "";
            inputPesan.focus();
        }

        function loadChat() {
            db.ref("chat").on("value", function(snapshot) {
                const chatDiv = document.getElementById("chat");
                let chatHTML = "";
                
                snapshot.forEach(function(child) {
                    const data = child.val();
                    const id = child.key;
                    const isMe = data.nama === user;
                    const date = new Date(data.waktu);
                    const timeStr = date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0');

                    chatHTML += `
                        <div class="flex w-full ${isMe ? 'justify-end' : 'justify-start'} mb-2">
                            <div class="message-bubble group max-w-[85%] md:max-w-[70%] relative">
                                ${!isMe ? `<span class="text-[11px] font-bold text-primary mb-1 ml-2 block">${data.nama}</span>` : ''}
                                <div class="px-4 py-3 rounded-2xl shadow-sm ${isMe ? 
                                    'bg-primary text-white rounded-tr-none' : 
                                    'bg-white text-slate-800 rounded-tl-none border border-slate-100'}">
                                    <p class="text-sm leading-relaxed whitespace-pre-wrap">${data.pesan}</p>
                                    <div class="flex items-center justify-end gap-2 mt-1">
                                        <span class="text-[9px] opacity-60">${timeStr}</span>
                                        ${isMe ? `
                                            <button onclick="hapus('${id}')" class="opacity-0 group-hover:opacity-100 transition-opacity ml-2">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-red-200 hover:text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                </svg>
                                            </button>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                chatDiv.innerHTML = chatHTML;
                chatDiv.scrollTop = chatDiv.scrollHeight;
                
                // Audio notification on change if user is logged in
                if(snapshot.numChildren() > 0) {
                    notificationSound.play().catch(e => console.log("Audio play blocked"));
                }
            });
        }

        function hapus(id) {
            if (confirm("Hapus pesan ini secara permanen?")) {
                db.ref("chat/" + id).remove();
            }
        }
    </script>
</body>
</html>
