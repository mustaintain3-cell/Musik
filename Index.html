<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Repo Saya</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#8b5cf6',
            dark: '#0f172a',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
    }
    
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .btn-gradient {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .btn-gradient:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-6">

  <!-- Background Decoration -->
  <div class="fixed inset-0 overflow-hidden -z-10">
    <div class="absolute -top-[20%] -left-[10%] w-[500px] h-[500px] bg-violet-900/20 rounded-full blur-[120px]"></div>
    <div class="absolute top-[40%] -right-[10%] w-[400px] h-[400px] bg-emerald-900/20 rounded-full blur-[100px]"></div>
  </div>

  <main class="w-full max-w-md flex flex-col items-center">
    
    <!-- Header -->
    <header class="text-center mb-12 animate-in fade-in zoom-in duration-700">
      <div class="inline-block p-3 rounded-2xl bg-white/5 mb-4 shadow-2xl">
        <span class="text-4xl">📱</span>
      </div>
      <h1 class="text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">
        MENU SAYA
      </h1>
      <p class="text-slate-400 mt-2 font-light">Akses cepat repository Anda</p>
    </header>

    <!-- Navigation Container -->
    <section class="w-full space-y-4">
      
      <!-- Button 1 -->
      <a href="https://github.com/mustaintain3-cell/Musik" 
         target="_blank" 
         class="btn-gradient group relative flex items-center p-4 bg-white/5 hover:bg-blue-500/10 rounded-2xl border border-white/10 hover:border-blue-500/50 transition-all duration-300">
        <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-blue-500/20 text-blue-400 mr-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
        </div>
        <div class="flex-grow">
          <h3 class="font-semibold text-lg">Buka Repository</h3>
          <p class="text-xs text-slate-400">Lihat source code proyek</p>
        </div>
      </a>

      <!-- Button 2 -->
      <a href="https://github.com/mustaintain3-cell/Musik/upload/main" 
         target="_blank" 
         class="btn-gradient group relative flex items-center p-4 bg-white/5 hover:bg-emerald-500/10 rounded-2xl border border-white/10 hover:border-emerald-500/50 transition-all duration-300">
        <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-emerald-500/20 text-emerald-400 mr-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
        </div>
        <div class="flex-grow">
          <h3 class="font-semibold text-lg">Upload File</h3>
          <p class="text-xs text-slate-400">Tambahkan konten baru</p>
        </div>
      </a>

      <!-- Button 3 -->
      <a href="https://mustaintain3-cell.github.io/Musik" 
         target="_blank" 
         class="btn-gradient group relative flex items-center p-4 bg-white/5 hover:bg-orange-500/10 rounded-2xl border border-white/10 hover:border-orange-500/50 transition-all duration-300">
        <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-orange-500/20 text-orange-400 mr-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
        </div>
        <div class="flex-grow">
          <h3 class="font-semibold text-lg">Lihat Web</h3>
          <p class="text-xs text-slate-400">Kunjungi halaman web</p>
        </div>
      </a>

    </section>

    <!-- Footer -->
    <footer class="mt-16 text-center">
      <p class="text-slate-500 text-sm flex items-center gap-2">
        Akses cepat by Mustain <span class="text-orange-500">🔥</span>
      </p>
    </footer>

  </main>

  <script>
    // Smooth interaction reveal
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('mouseenter', () => {
        // Subtle haptic or trigger could go here
      });
    });
  </script>
</body>
</html>
