<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALAM TERAPY FM | Premium Healing Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-bg {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }
        .btn-hover:hover { transform: translateY(-2px); transition: all 0.3s ease; }
        .btn-active { transform: scale(0.95); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4 text-slate-100">

    <main class="w-full max-w-md">
        <!-- Main Card -->
        <div class="glass p-8 rounded-3xl shadow-2xl flex flex-col items-center">
            
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-teal-400 mb-2">
                    ALAM TERAPY FM
                </h1>
                <p class="text-slate-400 text-sm font-light">Klik PLAY untuk memulai sesi relaksasi Anda</p>
            </div>

            <!-- Visual Indicator -->
            <div id="info" class="mb-6 px-4 py-1.5 rounded-full bg-cyan-950/50 border border-cyan-500/30 text-cyan-300 text-xs font-semibold tracking-wider uppercase">
                Status: Siap diputar
            </div>

            <!-- Audio Player (Hidden UI, Custom Controls) -->
            <audio id="radio" class="hidden">
                <source id="source" src="" type="audio/mpeg">
            </audio>

            <!-- Control Grid -->
            <div class="grid grid-cols-3 gap-4 w-full">
                <button onclick="startRadio()" class="btn-hover col-span-3 bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold py-4 rounded-xl shadow-lg shadow-cyan-500/20 transition-all flex items-center justify-center gap-2">
                    <span>▶️</span> PLAY
                </button>
                
                <button onclick="nextSong()" class="btn-hover bg-slate-800 hover:bg-slate-700 border border-slate-700 py-3 rounded-xl transition-all">
                    ⏭️ Next
                </button>
                
                <button onclick="toggleShuffle()" id="shuffleBtn" class="btn-hover bg-slate-800 hover:bg-slate-700 border border-slate-700 py-3 rounded-xl transition-all col-span-2">
                    🔀 Mode: Normal
                </button>
            </div>

            <!-- Request CTA -->
            <a href="https://wa.me/6281267604835" target="_blank" class="mt-8 flex items-center justify-center gap-2 w-full py-3 rounded-xl bg-[#25D366] hover:bg-[#20bd5a] transition-all font-semibold shadow-lg shadow-green-900/20">
                <span>📩</span> Request Lagu via WhatsApp
            </a>
        </div>

        <!-- Footer Note -->
        <p class="text-center text-slate-600 text-[10px] mt-8 uppercase tracking-widest">
            Sistem Audio Terintegrasi v1.0
        </p>
    </main>

    <script>
        const playlist = [
            "https://mustaintain3-cell.github.io/Musik/lagu1.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu2.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu3.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu4.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu5.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu6.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu7.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu8.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu9.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu10.mp3"
            "https://mustaintain3-cell.github.io/Musik/lagu11.mp3"
        ];
        ];

        let index = 0;
        let shuffle = false;

        const audio = document.getElementById("radio");
        const source = document.getElementById("source");
        const info = document.getElementById("info");
        const shuffleBtn = document.getElementById("shuffleBtn");

        function startRadio(){
            if (audio.paused) {
                loadSong();
                audio.play();
            } else {
                audio.pause();
                info.innerHTML = "Status: Dijeda";
            }
        }

        function loadSong(){
            source.src = playlist[index];
            audio.load();
            info.innerHTML = "Memutar: Track " + (index + 1);
        }

        function nextSong(){
            if(shuffle){
                index = Math.floor(Math.random() * playlist.length);
            } else {
                index = (index + 1) % playlist.length;
            }
            loadSong();
            audio.play();
        }

        function toggleShuffle(){
            shuffle = !shuffle;
            shuffleBtn.innerText = shuffle ? "🔀 Mode: Acak" : "🔀 Mode: Normal";
            info.innerHTML = shuffle ? "Status: Acak Aktif" : "Status: Urutan Normal";
        }

        audio.onended = () => nextSong();
        audio.onerror = () => {
            console.error("Audio error, skipping...");
            nextSong();
        };

        // UI Feedback for Play state
        audio.onplay = () => info.innerHTML = "Status: Sedang Mengalun...";
    </script>
</body>
</html>
