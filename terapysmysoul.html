<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Soul Family Reflexology | Premium Wellness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: '#0a0a0a',
                        surface: '#161616',
                        gold: '#d4af37',
                    },
                    fontFamily: {
                        display: ['Playfair Display', 'serif'],
                        body: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-gold { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        .animate-bar { animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { height: 10px; } 50% { height: 25px; } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
    </style>
</head>
<body class="bg-charcoal text-white font-body selection:bg-gold selection:text-black">

    <!-- Hero Section -->
    <header class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://opal.google/board/blobs/7a971ce1-7400-4c8a-917b-aa8d9d977284')] bg-cover bg-center brightness-[0.3]"></div>
        <div class="relative z-10 text-center px-4">
            <h1 class="font-display text-6xl md:text-8xl mb-6 text-gold italic">My Soul Family</h1>
            <p class="text-xl md:text-2xl font-light mb-8 max-w-2xl mx-auto">Elevate your wellness journey with our premium reflexology sanctuary in the heart of Bogor.</p>
            <a href="#therapists" class="px-8 py-4 border border-gold hover:bg-gold hover:text-black transition-all duration-300 uppercase tracking-widest font-semibold">Discover Our Therapists</a>
        </div>
    </header>

    <!-- Therapist Grid -->
    <main id="therapists" class="py-20 px-4 md:px-12 max-w-7xl mx-auto">
        <h2 class="font-display text-4xl text-center mb-16">Meet Our Healing Team</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Repeat for 9 Therapists -->
            <script>
                const therapistNames = ["Ayu", "Budi", "Citra", "Dedi", "Eka", "Fani", "Gita", "Hadi", "Indah"];
                const media = ['https://opal.google/board/blobs/7a971ce1-7400-4c8a-917b-aa8d9d977284', 'https://opal.google/board/blobs/d1a031ae-a4f5-48ac-a93f-d9fc7ea26b6f', 'https://opal.google/board/blobs/c8b79c8a-3bfe-4384-8b9b-234f6a094219', 'https://opal.google/board/blobs/b9772ef7-c2c2-4ef9-bfee-8ccd7a342829', 'https://opal.google/board/blobs/9cec2312-3b67-4ce4-a3ce-db17e5bf3a1b', 'https://opal.google/board/blobs/71ad9e49-9a45-415c-a98b-c8b451ae7c45', 'https://opal.google/board/blobs/5e31b951-dab9-4702-952f-2574a111ea70', 'https://opal.google/board/blobs/7e219b29-2785-4555-8c55-21f2bffc0e5d', 'https://opal.google/board/blobs/a0e3ebd8-a663-4888-a047-799b19dd8986'];
                
                therapistNames.forEach((name, i) => {
                    document.write(`
                        <div class="glass p-6 rounded-2xl hover:border-gold transition-all duration-500 group">
                            <div class="overflow-hidden rounded-xl mb-4 h-64">
                                <img src="${media[i]}" alt="${name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            </div>
                            <h3 class="font-display text-2xl mb-2">${name}</h3>
                            <div class="flex gap-1 mb-4" id="rating-${i}">
                                ${[1,2,3,4,5].map(n => `<button onclick="setRating(${i}, ${n})" class="text-gray-600 hover:text-gold transition-colors">★</button>`).join('')}
                            </div>
                            <textarea placeholder="Your feedback..." class="w-full bg-black/50 p-3 rounded-lg mb-4 text-sm focus:outline-none focus:ring-1 focus:ring-gold"></textarea>
                            <button onclick="sendWhatsApp('${name}', ${i})" class="w-full py-2 bg-gold text-black font-bold uppercase text-xs tracking-wider rounded transition-transform hover:scale-[1.02]">Send Feedback</button>
                        </div>
                    `);
                });

                function setRating(tIndex, stars) {
                    const parent = document.getElementById(`rating-${tIndex}`);
                    const buttons = parent.querySelectorAll('button');
                    buttons.forEach((btn, idx) => {
                        btn.className = idx < stars ? 'text-gold' : 'text-gray-600';
                    });
                    parent.dataset.rating = stars;
                }

                function sendWhatsApp(name, i) {
                    const rating = document.getElementById(`rating-${i}`).dataset.rating || 0;
                    const feedback = document.querySelector(`#rating-${i}`).nextElementSibling.value;
                    const message = `Halo, saya ingin memberikan feedback untuk ${name}. Rating: ${rating}/5. Komentar: ${feedback}`;
                    window.open(`https://wa.me/6285697050819?text=${encodeURIComponent(message)}`, '_blank');
                }
            </script>
        </div>
    </main>

    <!-- Location Section -->
    <section class="py-20 bg-surface">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h2 class="font-display text-4xl mb-8">Visit Our Sanctuary</h2>
            <p class="text-gray-400 mb-4 text-lg italic">Ruko Bukit Dago, Gunung Sindur, Bogor, Jawa Barat</p>
            <a href="https://wa.me/6285697050819" class="text-gold underline hover:no-underline font-semibold">+62 856-9705-0819</a>
        </div>
    </section>

    <!-- Floating Audio Player -->
    <div class="fixed bottom-6 right-6 glass p-4 rounded-full flex items-center gap-4 z-50">
        <div class="flex gap-1 items-end h-6">
            <div class="w-1 bg-gold animate-bar delay-75"></div>
            <div class="w-1 bg-gold animate-bar delay-150"></div>
            <div class="w-1 bg-gold animate-bar delay-300"></div>
        </div>
        <audio id="audio" loop src="https://opal.google/board/blobs/7a971ce1-7400-4c8a-917b-aa8d9d9772840"></audio>
        <button onclick="toggleAudio()" id="playBtn" class="text-gold font-bold">PLAY</button>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = 'PAUSE';
            } else {
                audio.pause();
                playBtn.innerText = 'PLAY';
            }
        }
    </script>
</body>
</html>
