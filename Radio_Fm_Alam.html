<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALAM TERAPY FM | Premium Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#0f172a' },
                        emerald: { 500: '#10b981' },
                        blue: { 500: '#3b82f6' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 to-slate-950">

    <main class="w-full max-w-lg">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
                ALAM TERAPY FM
            </h1>
            <p class="text-slate-400 font-light tracking-wide uppercase text-xs">Streaming 24/7 • High Fidelity</p>
        </header>

        <!-- Main Card -->
        <div class="glass-panel rounded-3xl p-8 shadow-2xl relative overflow-hidden">
            <div id="status-pulse" class="absolute top-4 right-4 w-3 h-3 rounded-full bg-emerald-500 hidden pulse"></div>
            
            <div class="text-center mb-8">
                <div id="status" class="text-xs font-semibold uppercase tracking-widest text-cyan-400 mb-2">Ready to stream</div>
                <div id="track-name" class="text-sm text-slate-300 italic font-light truncate">Press Play to Start</div>
            </div>

            <audio id="audio"></audio>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="playRadio()" id="playBtn" class="col-span-2 group relative overflow-hidden bg-blue-600 hover:bg-blue-500 transition-all duration-300 py-4 rounded-2xl font-bold shadow-lg shadow-blue-900/20 active:scale-95">
                    <span class="relative z-10 flex items-center justify-center gap-2">▶️ PLAY / PAUSE</span>
                </button>
                
                <button onclick="nextSong()" class="bg-slate-800 hover:bg-slate-700 transition-colors p-4 rounded-xl flex items-center justify-center font-semibold">
                    ⏭️ NEXT
                </button>
                <button onclick="toggleShuffle()" id="shuffleBtn" class="bg-slate-800 hover:bg-slate-700 transition-colors p-4 rounded-xl font-semibold">
                    🔀 Normal
                </button>
            </div>

            <div class="mt-8 pt-6 border-t border-white/10 flex gap-3">
                <a href="https://wa.me/6281267604835" target="_blank" class="flex-1 text-center bg-emerald-600 hover:bg-emerald-500 transition-all p-3 rounded-xl font-medium text-sm">
                    📩 Request
                </a>
                <button onclick="shareRadio()" class="flex-1 text-center bg-white/10 hover:bg-white/20 transition-all p-3 rounded-xl font-medium text-sm">
                    📢 Share
                </button>
            </div>
        </div>
    </main>

    <script>
        const playlist = [
            "https://mustaintain3-cell.github.io/Musik/lagu1.mp3", "https://mustaintain3-cell.github.io/Musik/lagu2.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu3.mp3", "https://mustaintain3-cell.github.io/Musik/lagu4.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu5.mp3", "https://mustaintain3-cell.github.io/Musik/lagu6.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu7.mp3", "https://mustaintain3-cell.github.io/Musik/lagu8.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu9.mp3", "https://mustaintain3-cell.github.io/Musik/lagu10.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu11.mp3", "https://mustaintain3-cell.github.io/Musik/lagu12.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu13.mp3", "https://mustaintain3-cell.github.io/Musik/lagu14.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu15.mp3", "https://mustaintain3-cell.github.io/Musik/lagu16.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu17.mp3", "https://mustaintain3-cell.github.io/Musik/lagu18.mp3",
            "https://mustaintain3-cell.github.io/Musik/lagu19.mp3", "https://mustaintain3-cell.github.io/Musik/lagu20.mp3"
        ];

        const iklan = "https://mustaintain3-cell.github.io/Musik/iklanalamterapy.mp3";

        let index = 0;
        let laguKe = 0;
        let shuffle = false;
        let audio = document.getElementById("audio");
        let status = document.getElementById("status");
        let trackName = document.getElementById("track-name");
        let statusPulse = document.getElementById("status-pulse");

        function playRadio() {
            if (audio.paused) {
                if (!audio.src) loadSong();
                audio.play();
                status.innerHTML = "🎶 Now Playing";
                statusPulse.classList.remove('hidden');
            } else {
                audio.pause();
                status.innerHTML = "⏸️ Paused";
                statusPulse.classList.add('hidden');
            }
        }

        function loadSong() {
            audio.src = playlist[index];
            trackName.innerText = "Playing Track " + (index + 1);
        }

        function nextSong() {
            laguKe++;
            if (laguKe % 2 === 0) {
                audio.src = iklan;
                status.innerHTML = "📢 Sponsored";
                audio.play();
                audio.onended = () => lanjutLagu();
            } else {
                lanjutLagu();
            }
        }

        function lanjutLagu() {
            index = shuffle ? Math.floor(Math.random() * playlist.length) : (index + 1) % playlist.length;
            loadSong();
            audio.play();
            status.innerHTML = "🎶 Now Playing";
        }

        function toggleShuffle() {
            shuffle = !shuffle;
            document.getElementById("shuffleBtn").innerText = shuffle ? "🔀 Shuffling" : "🔀 Normal";
        }

        function shareRadio() {
            if (navigator.share) {
                navigator.share({ title: "ALAM TERAPY FM", text: "Streaming Musik 24 Jam", url: window.location.href });
            } else {
                alert("Share feature not supported on this browser.");
            }
        }

        audio.onended = nextSong;
        audio.onerror = nextSong;
    </script>
</body>
</html>
