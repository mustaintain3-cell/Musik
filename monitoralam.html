<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlamTerapi | Admin Command Center</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#8b5cf6', // Electric Violet
                            secondary: '#10b981', // Emerald
                            dark: '#0f172a', // Deep Slate
                            card: '#1e293b',
                            accent: '#334155'
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            scrollbar-width: thin;
            scrollbar-color: #334155 #0f172a;
        }
        /* Custom Scrollbar for Chrome/Safari */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b5cf6; }

        .glass-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-bubble-admin {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            border-radius: 18px 18px 4px 18px;
        }

        .chat-bubble-user {
            background: #334155;
            border-radius: 18px 18px 18px 4px;
        }

        .user-card-active {
            background: rgba(139, 92, 246, 0.15);
            border-color: #8b5cf6;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: calc(100vh - 100px);
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .bento-grid {
                grid-template-columns: 1fr;
                height: auto;
            }
            .mobile-hide { display: none; }
            .mobile-active-view { display: block !important; }
        }
    </style>
</head>
<body class="antialiased font-sans">

    <!-- Header -->
    <header class="glass-header sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-brand-primary rounded-xl flex items-center justify-center shadow-lg shadow-brand-primary/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                </div>
                <h1 class="text-xl font-display font-bold tracking-tight">Admin<span class="text-brand-primary">Command</span></h1>
            </div>
            <div class="flex items-center space-x-4">
                <span class="hidden sm:inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-brand-secondary/10 text-brand-secondary border border-brand-secondary/20">
                    <span class="w-2 h-2 bg-brand-secondary rounded-full mr-2 animate-pulse"></span>
                    Live System Active
                </span>
                <div class="w-10 h-10 rounded-full bg-brand-accent border border-white/10 flex items-center justify-center cursor-pointer hover:bg-brand-primary transition-all">
                    <span class="text-sm font-bold">AD</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-4 md:p-6 lg:p-8">
        
        <div class="bento-grid">
            
            <!-- Sidebar: User List -->
            <aside class="flex flex-col bg-brand-card rounded-3xl border border-white/5 overflow-hidden shadow-2xl animate-fade-in-up">
                <div class="p-6 border-b border-white/5">
                    <h2 class="text-lg font-bold font-display mb-1">Daftar Chat User</h2>
                    <p class="text-xs text-slate-400">Pilih pengguna untuk membalas pesan</p>
                </div>
                
                <div id="userList" class="flex-1 overflow-y-auto p-4 space-y-3">
                    <!-- Loading State -->
                    <div class="animate-pulse space-y-4">
                        <div class="h-16 bg-brand-accent/50 rounded-2xl"></div>
                        <div class="h-16 bg-brand-accent/50 rounded-2xl"></div>
                        <div class="h-16 bg-brand-accent/50 rounded-2xl"></div>
                    </div>
                </div>
            </aside>

            <!-- Main: Chat Interface -->
            <section id="chatSection" class="flex flex-col bg-brand-card rounded-3xl border border-white/5 overflow-hidden shadow-2xl animate-fade-in-up" style="animation-delay: 0.1s;">
                <!-- Chat Header -->
                <div class="p-6 border-b border-white/5 bg-brand-accent/20 flex items-center justify-between">
                    <div>
                        <h3 id="activeUserName" class="text-lg font-bold font-display">Pilih Pengguna</h3>
                        <p id="chatStatus" class="text-xs text-slate-400">Menunggu sesi...</p>
                    </div>
                    <div class="flex space-x-2">
                        <button class="p-2 rounded-lg hover:bg-white/5 transition-colors"><svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg></button>
                    </div>
                </div>

                <!-- Messages Window -->
                <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-4 bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')]">
                    <div class="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-50">
                        <div class="w-20 h-20 bg-brand-accent rounded-full flex items-center justify-center">
                            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"></path></svg>
                        </div>
                        <p class="text-sm">Silakan pilih user dari daftar di samping<br>untuk mulai berkomunikasi.</p>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="p-6 bg-brand-dark/50 border-t border-white/5">
                    <div class="relative flex items-center space-x-3">
                        <div class="flex-1">
                            <input type="text" id="balasan" 
                                class="w-full bg-brand-accent/30 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-brand-primary focus:border-transparent outline-none transition-all placeholder:text-slate-500"
                                placeholder="Ketik pesan balasan di sini..."
                                onkeypress="if(event.key === 'Enter') balas()">
                        </div>
                        <button onclick="balas()" class="bg-brand-primary hover:bg-brand-primary/80 text-white px-6 py-4 rounded-2xl font-bold transition-all transform active:scale-95 flex items-center space-x-2 shadow-lg shadow-brand-primary/20">
                            <span>Kirim</span>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

    <script>
        // Firebase Config
        const config = {
            apiKey: "AIzaSyAYG9MhzNiYKUy8XdmYmKWIH-kMUpxvGzk",
            authDomain: "alamterapi1.firebaseapp.com",
            databaseURL: "https://alamterapi1-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(config);

        let currentUser = "";
        const userListDiv = document.getElementById("userList");
        const chatDiv = document.getElementById("chat");
        const activeUserName = document.getElementById("activeUserName");
        const chatStatus = document.getElementById("chatStatus");

        // LOAD USERS FROM FIREBASE
        firebase.database().ref("chat").on("value", function(snapshot){
            const data = snapshot.val();
            let html = "";

            if (!data) {
                userListDiv.innerHTML = `<div class="text-center py-10 text-slate-500 text-sm">Tidak ada chat aktif</div>`;
                return;
            }

            for(let uid in data){
                const isActive = uid === currentUser ? 'user-card-active' : '';
                const lastMessage = "Klik untuk melihat detail chat"; // Logic can be extended to show real last msg
                
                html += `
                <div class="group p-4 bg-brand-accent/20 border border-white/5 rounded-2xl cursor-pointer hover:bg-brand-accent/40 transition-all ${isActive}" 
                     onclick="bukaChat('${uid}')">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-gradient-to-br from-brand-primary to-blue-500 rounded-xl flex items-center justify-center text-lg font-bold shadow-inner">
                            ${uid.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-bold truncate">${uid}</h4>
                            <p class="text-xs text-slate-400 truncate mt-0.5">${lastMessage}</p>
                        </div>
                        <div class="w-2 h-2 rounded-full bg-brand-secondary opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </div>
                </div>`;
            }

            userListDiv.innerHTML = html;
        });

        // OPEN CHAT WITH SPECIFIC USER
        function bukaChat(uid){
            currentUser = uid;
            activeUserName.innerText = uid;
            chatStatus.innerText = "Sesi Aktif - Terhubung";
            chatDiv.innerHTML = `<div class="text-center py-4 text-xs text-slate-500 uppercase tracking-widest font-bold">Riwayat Pesan Dimuat</div>`;

            // Re-render user list to show active state
            firebase.database().ref("chat").once("value", function(snapshot){
                // This triggers the .on("value") listener naturally or we could manually refresh classes
            });

            // Listen for messages
            firebase.database().ref("chat/"+uid).off(); // Prevent multiple listeners
            firebase.database().ref("chat/"+uid).on("child_added", function(snapshot){
                const data = snapshot.val();
                appendMessage(data);
                scrollChatToBottom();
            });
        }

        // APPEND MESSAGE TO UI
        function appendMessage(data) {
            const isAdmin = data.dari === "admin";
            const bubbleClass = isAdmin ? "chat-bubble-admin" : "chat-bubble-user";
            const wrapperClass = isAdmin ? "flex justify-end" : "flex justify-start";
            
            const messageHtml = `
                <div class="${wrapperClass} animate-fade-in-up">
                    <div class="max-w-[80%] ${bubbleClass} px-5 py-3 shadow-lg">
                        <p class="text-xs opacity-50 mb-1 font-bold uppercase tracking-tighter">${data.dari}</p>
                        <p class="text-sm leading-relaxed">${data.pesan}</p>
                    </div>
                </div>
            `;
            
            // Remove the placeholder on first message
            if (chatDiv.innerHTML.includes("Silakan pilih user")) {
                chatDiv.innerHTML = "";
            }
            
            chatDiv.innerHTML += messageHtml;
        }

        // SEND MESSAGE
        function balas(){
            const input = document.getElementById("balasan");
            const pesan = input.value.trim();

            if (!currentUser) {
                alert("Silakan pilih user terlebih dahulu!");
                return;
            }

            if (pesan === "") return;

            firebase.database().ref("chat/"+currentUser).push({
                pesan: pesan,
                dari: "admin",
                timestamp: Date.now()
            });

            input.value = "";
        }

        // UTILS
        function scrollChatToBottom() {
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        // Handle Mobile Responsiveness for interaction
        function toggleView() {
            // Logic for a truly mobile focused toggle if needed
        }
    </script>
</body>
</html>
