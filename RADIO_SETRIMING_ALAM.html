<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALAM TERAPY FM | Premium Wellness Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#00ffcc',
                        deep: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .radio-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        audio::-webkit-media-controls-panel {
            background-color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body class="text-white font-sans antialiased flex items-center justify-center p-4">

    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-2xl transition-all duration-500 hover:border-neon/30">
        <!-- Header -->
        <header class="text-center mb-8">
            <div class="inline-block p-4 rounded-full bg-neon/10 mb-4 radio-pulse">
                <span class="text-4xl">🎧</span>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white mb-2">ALAM TERAPY FM</h1>
            <p class="text-slate-400 text-sm tracking-wide uppercase font-medium">Kesehatan & Kebugaran 24/7</p>
        </header>

        <!-- Media Engine -->
        <div class="space-y-6">
            <div id="status-card" class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700 text-center">
                <p class="text-[10px] uppercase tracking-[0.2em] text-neon mb-1 font-bold">Sedang Mengudara</p>
                <div id="info" class="text-lg font-semibold truncate">Memuat data...</div>
            </div>

            <audio id="radio" class="w-full h-12 rounded-lg"></audio>

            <button onclick="playRadio()" class="w-full py-4 bg-neon hover:bg-[#00e6b8] text-slate-900 font-bold rounded-2xl transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">
                <span id="btn-icon">▶</span> <span id="btn-text">MULAI STREAMING</span>
            </button>
        </div>

        <!-- Footer Actions -->
        <div class="mt-8 pt-8 border-t border-slate-700 text-center">
            <a href="https://wa.me/6281267604835?text=Halo%20ALAM%20TERAPY%20FM%2C%20saya%20ingin%20request%20lagu%20atau%20iklan" 
               target="_blank" 
               class="inline-flex items-center gap-2 bg-[#25D366] hover:bg-[#20bd5a] text-white px-6 py-3 rounded-full font-bold text-sm transition-transform hover:scale-105">
                <span>📩</span> Request Lagu / Iklan
            </a>
        </div>
    </div>

    <script>
        const playlist = [
            { title: "Opening Penyiar - Alam Terapy", src: "https://mustaintain3-cell.github.io/Musik/lagu4.mp3" },
            { title: "Kesehatan & Kebugaran Vol 1", src: "https://mustaintain3-cell.github.io/Musik/lagu1.mp3" },
            { title: "Relaksasi Alam", src: "https://mustaintain3-cell.github.io/Musik/lagu2.mp3" },
            { title: "Pesan Sponsor - Alam Terapy", src: "https://mustaintain3-cell.github.io/Musik/iklanalamterapy.mp3" }
        ];

        let index = 0;
        const audio = document.getElementById("radio");
        const info = document.getElementById("info");
        const btnText = document.getElementById("btn-text");
        const btnIcon = document.getElementById("btn-icon");

        function loadSong(i) {
            if (!playlist[i].src) {
                index = (index + 1) % playlist.length;
                loadSong(index);
                return;
            }
            audio.src = playlist[i].src;
            info.innerHTML = playlist[i].title;
        }

        function playRadio() {
            if (audio.paused) {
                audio.play();
                btnText.innerText = "SEDANG BERMAIN";
                btnIcon.innerText = "⏸";
            } else {
                audio.pause();
                btnText.innerText = "LANJUTKAN";
                btnIcon.innerText = "▶";
            }
        }

        audio.addEventListener("ended", () => {
            index = (index + 1) % playlist.length;
            loadSong(index);
            audio.play();
        });

        window.onload = () => {
            loadSong(index);
            // Autoplay attempt
            audio.play().then(() => {
                btnText.innerText = "SEDANG BERMAIN";
                btnIcon.innerText = "⏸";
            }).catch(() => {
                console.log("Autoplay blocked by browser. User action required.");
            });
        };
    </script>
</body>
</html>
