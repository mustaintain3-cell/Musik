<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chat Admin</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/6a21867623.js" crossorigin="anonymous"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#8b5cf6', // Electric Violet
                        secondary: '#10b981', // Emerald
                        dark: '#0f172a', // Deep Slate
                        surface: '#1e293b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                        'pulse-subtle': 'pulseSubtle 2s infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pulseSubtle: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.7' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617; /* Extra dark slate */
            scrollbar-width: thin;
            scrollbar-color: #334155 #020617;
        }
        
        /* Custom Scrollbar for Chrome/Safari */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .glass-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-container {
            height: calc(100vh - 160px);
            background-image: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
        }

        .message-bubble {
            max-width: 80%;
            position: relative;
            transition: transform 0.2s ease;
        }

        .customer-bubble {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }

        .admin-bubble {
            background: #1e293b;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #10b981;
        }
    </style>
</head>
<body class="font-sans text-slate-200 antialiased overflow-hidden">

    <!-- Header -->
    <header class="glass-header fixed top-0 w-full z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-gradient-to-tr from-primary to-secondary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
                <i class="fa-solid fa-headset text-white"></i>
            </div>
            <div>
                <h2 class="font-display text-xl font-bold tracking-tight text-white leading-none">Support Hub</h2>
                <div class="flex items-center mt-1">
                    <span class="pulse-dot"></span>
                    <span class="text-[10px] uppercase tracking-widest font-semibold text-slate-400">Agent Online</span>
                </div>
            </div>
        </div>
        <div class="hidden md:flex space-x-6 text-sm font-medium text-slate-400">
            <a href="#" class="hover:text-primary transition-colors">Dashboard</a>
            <a href="#" class="hover:text-primary transition-colors">Tickets</a>
            <a href="#" class="text-white border-b-2 border-primary pb-1">Live Chat</a>
        </div>
        <div class="flex items-center space-x-4">
            <button class="text-slate-400 hover:text-white transition-colors">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            <div class="w-8 h-8 rounded-full bg-slate-800 border border-slate-700 overflow-hidden">
                <div class="w-full h-full bg-gradient-to-b from-slate-600 to-slate-800 flex items-center justify-center text-[10px]">AD</div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 pb-32 h-screen w-full max-w-4xl mx-auto px-4">
        <!-- Chat Area -->
        <div id="chat" class="chat-container overflow-y-auto space-y-4 pr-2 scroll-smooth">
            <!-- Messages will be injected here -->
            
            <!-- Empty State Loader (Visible before data loads) -->
            <div id="loading-state" class="flex flex-col items-center justify-center h-full text-slate-500 opacity-60">
                <i class="fa-solid fa-comments text-4xl mb-4 animate-pulse"></i>
                <p class="text-sm font-medium">Initializing secure connection...</p>
            </div>
        </div>
    </main>

    <!-- Control Footer -->
    <div class="fixed bottom-0 left-0 right-0 p-6 z-50">
        <div class="max-w-4xl mx-auto">
            <div class="input-glass rounded-2xl p-2 flex items-center shadow-2xl">
                <div class="flex space-x-2 px-3">
                    <button class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-primary hover:bg-slate-800/50 rounded-xl transition-all">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>
                </div>
                
                <input 
                    type="text" 
                    id="pesan" 
                    placeholder="Type your message..." 
                    class="bg-transparent border-none focus:ring-0 text-white flex-grow px-4 py-3 text-sm placeholder-slate-500"
                    onkeydown="if(event.key === 'Enter') kirim()"
                >
                
                <button 
                    onclick="kirim()" 
                    class="bg-primary hover:bg-violet-500 text-white font-bold px-6 py-3 rounded-xl shadow-lg shadow-primary/30 transition-all flex items-center space-x-2 active:scale-95"
                >
                    <span class="text-sm hidden sm:inline">Send</span>
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </div>
            <p class="text-[10px] text-center mt-3 text-slate-500 tracking-wide uppercase font-semibold">
                End-to-End Encrypted Session
            </p>
        </div>
    </div>

    <!-- Firebase SDK (v8.10.0) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

    <script>
        // --- Logic and State Management ---

        // Firebase Configuration
        const config = {
            apiKey: "AIzaSyAYG9MhzNiYKUy8XdmYmKWIH-kMUpxvGzk",
            authDomain: "alamterapi1.firebaseapp.com",
            databaseURL: "https://alamterapi1-default-rtdb.firebaseio.com"
        };

        // Initialize Firebase
        firebase.initializeApp(config);

        // Get or Generate UserId
        let userId = localStorage.getItem("userId");
        if (!userId) {
            userId = "user_" + Math.random().toString(36).substr(2, 9);
            localStorage.setItem("userId", userId);
        }

        const chatBox = document.getElementById("chat");
        const loadingState = document.getElementById("loading-state");
        const pesanInput = document.getElementById("pesan");

        // UI: Append message to chat display
        function appendMessage(data) {
            if (loadingState) loadingState.style.display = "none";
            
            const isCustomer = data.dari === "customer";
            const messageWrapper = document.createElement("div");
            messageWrapper.className = `flex w-full mb-4 animate-fade-in-up ${isCustomer ? 'justify-end' : 'justify-start'}`;

            const bubble = document.createElement("div");
            bubble.className = `message-bubble px-5 py-3 rounded-2xl text-sm leading-relaxed ${
                isCustomer ? 'customer-bubble' : 'admin-bubble'
            }`;
            
            bubble.innerHTML = `
                <div class="font-bold text-[10px] uppercase opacity-70 mb-1 tracking-wider">
                    ${isCustomer ? 'You' : 'Admin'}
                </div>
                <div class="message-text">${data.pesan}</div>
                <div class="text-[9px] text-right mt-1 opacity-50">
                    ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                </div>
            `;

            messageWrapper.appendChild(bubble);
            chatBox.appendChild(messageWrapper);
            
            // Auto-scroll to bottom
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Action: Send Message
        function kirim() {
            const pesanValue = pesanInput.value.trim();

            if (pesanValue !== "") {
                firebase.database().ref("chat/" + userId).push({
                    pesan: pesanValue,
                    dari: "customer",
                    timestamp: Date.now()
                }).then(() => {
                    pesanInput.value = "";
                }).catch((error) => {
                    console.error("Error sending message: ", error);
                    alert("Message delivery failed. Please check your connection.");
                });
            }
        }

        // Listener: Real-time Data Sync
        firebase.database().ref("chat/" + userId).on("child_added", function(snapshot) {
            const data = snapshot.val();
            appendMessage(data);
        });

        // Visual Polish: Welcome Message if empty after 2 seconds
        setTimeout(() => {
            if (chatBox.children.length <= 1) { // Only loading state present
                if (loadingState) {
                    loadingState.innerHTML = `
                        <div class="text-center px-8 animate-fade-in-up">
                            <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6 border border-slate-700 shadow-xl">
                                <i class="fa-solid fa-hand-sparkles text-2xl text-primary"></i>
                            </div>
                            <h3 class="text-white text-lg font-display mb-2">Welcome to Support!</h3>
                            <p class="text-xs max-w-[240px] mx-auto text-slate-400">Our team is ready to help. Send a message below to start your conversation.</p>
                        </div>
                    `;
                }
            }
        }, 2500);

    </script>
</body>
</html>
