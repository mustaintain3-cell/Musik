<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio ALAM TERAPY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #0f172a, #020617);
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-hover:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .btn-hover:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- UI Container -->
    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl text-center text-white transition-all duration-500 ease-out">
        
        <!-- Header -->
        <div class="mb-8">
            <h2 class="text-3xl font-bold tracking-tight mb-2">📻 Radio ALAM TERAPY</h2>
            <div class="h-1 w-16 bg-emerald-500 mx-auto rounded-full"></div>
        </div>

        <!-- Track Display -->
        <div class="mb-10">
            <p id="judul" class="text-lg font-medium text-slate-300 italic min-h-[1.5rem]">
                Siap diputar...
            </p>
        </div>

        <!-- Control Interface -->
        <div class="grid grid-cols-2 gap-4">
            <button class="btn-hover col-span-2 py-4 bg-emerald-500 rounded-2xl font-bold text-white shadow-lg shadow-emerald-500/20 transition-all" onclick="playRadio()">
                ▶️ PLAY
            </button>
            <button class="btn-hover py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-semibold transition-all" onclick="prevSong()">
                ⏮️ PREV
            </button>
            <button class="btn-hover py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-semibold transition-all" onclick="nextSong()">
                ⏭️ NEXT
            </button>
            <button class="btn-hover col-span-2 py-3 bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500/20 rounded-xl font-semibold transition-all" onclick="stopRadio()">
                ⏹️ STOP
            </button>
        </div>

    </div>

    <!-- Media Engine -->
    <audio id="audio"></audio>

    <script>
        const lagu = [
            {
                nama: "Iklan ALAM TERAPY",
                src: "https://mustaintain3-cell.github.io/Musik/iklanalamterapy.mp3"
            },
            {
                nama: "Lagu 2",
                src: "https://mustaintain3-cell.github.io/Musik/lagu2.mp3"
            },
            {
                nama: "Lagu 3",
                src: "https://mustaintain3-cell.github.io/Musik/lagu3.mp3"
            }
        ];

        let index = 0;
        const audio = document.getElementById("audio");
        const judul = document.getElementById("judul");

        function loadSong(i) {
            audio.src = lagu[i].src;
            judul.innerText = "🎵 " + lagu[i].nama;
        }

        function playRadio() {
            // If already playing the same song, just keep it, otherwise load
            if (audio.paused) {
                if (!audio.src) loadSong(index);
                audio.play();
            } else {
                loadSong(index);
                audio.play();
            }
        }

        function nextSong() {
            index++;
            if(index >= lagu.length) index = 0;
            loadSong(index);
            audio.play();
        }

        function prevSong() {
            index--;
            if(index < 0) index = lagu.length - 1;
            loadSong(index);
            audio.play();
        }

        function stopRadio() {
            audio.pause();
            audio.currentTime = 0;
            judul.innerText = "Siap diputar...";
        }

        audio.onended = function() {
            nextSong();
        }
    </script>
</body>
</html>
